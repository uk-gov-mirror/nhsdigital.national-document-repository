repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: scan-secrets
        name: Scan the changes for secrets
        entry: ./src/secrets/scan-secrets.sh
        args: ["check=staged-changes"]
        language: script
        pass_filenames: false

  - repo: local
    hooks:
      - id: linting
        name: Run linting
        entry: make format CONTAINER=true
        language: system
