name: "Base Bulk Upload - Execute a Bulk Upload"

run-name: "${{ github.event.inputs.sandbox }} | ${{ github.event.inputs.base_branch }} | ${{ github.event.inputs.environment }} | ${{ github.event.inputs.combi_settings }} | ${{ github.event.inputs.file_count }}"

permissions:
  pull-requests: write
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

on:
  workflow_call:
    inputs:
      sandbox:
        description: "Which Sandbox to push to."
        required: true
        type: "string"
        default: "ndr"
      base_branch:
        description: "Which Feature Branch for the Bulk Upload Script"
        required: false
        type: "string"
        default: "main"
      environment:
        description: "Which Environment settings to use."
        required: true
        type: "string"
        default: "development"
      combi_settings:
        description: "Use 300 or 8000 patients"
        required: false
        type: "string"
        default: "combi300"
      file_count:
        description: "How many files per patient to generate."
        required: false
        type: "string"
        default: "3"
      lambda_type:
        description: "Which lambda to trigger (BulkUploadMetadataLambda or BulkUploadMetadataProcessor)"
        required: false
        type: "string"
        default: "BulkUploadMetadataLambda"
      run_bulk_upload_setup:
        description: "Run bulk upload setup step"
        required: false
        type: "boolean"
        default: true
      run_document_review_setup:
        description: "Run document review setup step"
        required: false
        type: "boolean"
        default: true
    secrets:
      AWS_ASSUME_ROLE:
        required: true

jobs:
  perform-bulk-upload:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Configure AWS Credentials for ${{ vars.AWS_REGION }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE }}
          role-skip-session-tagging: true
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3
        working-directory: ./tests/bulk-upload/scripts

      - name: Setup Bulk Upload
        if: ${{ inputs.run_bulk_upload_setup }}
        run: |
          python setup_bulk_upload.py \
            --environment "${{ inputs.sandbox }}" \
            --delete-table \
            --download-data \
            --build-files \
            --data-file "${{ inputs.combi_settings }}" \
            --upload \
            --num-files "${{ inputs.file_count }}" \
            --empty-lloydgeorge-store
        working-directory: ./tests/bulk-upload/scripts

      - name: Setup Document Review
        if: ${{ inputs.run_document_review_setup }}
        run: |
          python setup_document_review.py
        working-directory: ./tests/bulk-upload/scripts
        env:
            ENVIRONMENT: "${{ inputs.sandbox }}"

      - name: Run Bulk Upload
        run: |
          python run_bulk_upload.py \
            --environment "${{ inputs.sandbox }}" \
            --lambda-type "${{ inputs.lambda_type }}" \
            --start-bulk-upload
        working-directory: ./tests/bulk-upload/scripts
