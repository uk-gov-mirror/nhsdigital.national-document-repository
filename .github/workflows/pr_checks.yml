name: PR Checks & Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body for unchecked checkboxes
        uses: zentered/verify-pr-checklist@v2
        with:
          checklist: ${{ github.event.pull_request.body }}
