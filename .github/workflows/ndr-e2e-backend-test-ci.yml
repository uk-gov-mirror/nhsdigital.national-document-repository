name: "Merge to main: E2E Tests Backend"

on:
  workflow_run:
    workflows:
      - "CI Lambdas - CI Feature to Main"
    types:
      - completed
    branches:
      - main

permissions:
  pull-requests: write
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  lg-fhir-api-e2e-tests:
    name: "Run LG FHIR API E2E Tests"
    uses: ./.github/workflows/base-e2e-backendtest.yml
    with:
      build_branch: main
      environment: development
      sandbox: ndr-dev
    secrets:
      AWS_ASSUME_ROLE: ${{ secrets.AWS_ASSUME_ROLE }}

  core-fhir-api-e2e-tests:
    name: "Run Core FHIR API E2E Tests"
    uses: ./.github/workflows/base-e2e-fhir-backendtest.yml
    with:
      build_branch: main
      environment: development
      sandbox: ndr-dev
    secrets:
      AWS_ASSUME_ROLE: ${{ secrets.AWS_ASSUME_ROLE }}

  services-mns-e2e-tests:
    name: "Run MNS E2E Tests"
    uses: ./.github/workflows/base-e2e-mns.yml
    with:
      build_branch: main
      environment: development
      sandbox: ndr-dev
    secrets:
      AWS_ASSUME_ROLE: ${{ secrets.AWS_ASSUME_ROLE }}

  notify-slack:
    name: Notify Slack on Failure
    runs-on: ubuntu-latest
    environment: development
    needs: [lg-fhir-api-e2e-tests, core-fhir-api-e2e-tests, services-mns-e2e-tests]
    if: failure()
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE }}
          role-skip-session-tagging: true
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Get slack bot token from SSM parameter store
        id: ssm-parameters
        run: |
          slack_bot_token=$(aws ssm get-parameter --name "/ndr/alerting/slack/bot_token" --with-decryption --query "Parameter.Value" --output text)
          echo "::add-mask::$slack_bot_token"
          echo "SLACK_BOT_TOKEN=$slack_bot_token" >> $GITHUB_ENV

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ env.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ vars.ALERTS_SLACK_CHANNEL_ID }}",
              "attachments": [
                {
                  "color": "#ff0000",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "❌ Workflow `${{ github.workflow }}` failed"
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Triggered by:* `${{ github.actor }}`\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}>"
                      }
                    },
                    {
                      "type": "divider"
                    },
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "mrkdwn",
                          "text": "*lg-fhir-api-e2e-tests:* ${{ needs.lg-fhir-api-e2e-tests.result == 'success' && ':white_check_mark:' || ':x:' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*core-fhir-api-e2e-tests:* ${{ needs.core-fhir-api-e2e-tests.result == 'success' && ':white_check_mark:' || ':x:' }}"
                        },
                        {
                          "type": "mrkdwn",
                          "text": "*services-mns-e2e-tests:* ${{ needs.services-mns-e2e-tests.result == 'success' && ':white_check_mark:' || ':x:' }}"
                        }
                      ]
                    },
                    {
                      "type": "context",
                      "elements": [
                        {
                          "type": "mrkdwn",
                          "text": "Environment: `${{ needs.core-fhir-api-e2e-tests.outputs.environment }}` | Sandbox: `${{ needs.core-fhir-api-e2e-tests.outputs.sandbox }}`"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
